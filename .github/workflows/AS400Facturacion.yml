name: AS400 Facturacion TN5250

on:
  workflow_dispatch:

jobs:
  as400-facturacion:
    runs-on: self-hosted
    env:
      AS400_TRANSPORT: TN5250
      AS400_HOST: ${{ secrets.AS400_HOST }}
      AS400_PORT: "23"
      AS400_CODEPAGE: "cp1252"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar p5250
        run: python -m pip install --user p5250

      - name: Ejecutar facturacion AS400 (CSV)
        run: python as400/as400_Test.py