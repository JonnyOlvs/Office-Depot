name: regresionOffice

on:
  workflow_dispatch:
  schedule:
    # Lunes 08:00 Ciudad de México (horario estándar UTC-6) → 14:00 UTC. En horario de verano (UTC-5) serían las 09:00 locales; ajusta la hora UTC si lo necesitas.
    - cron: '0 14 * * 1'

concurrency:
  group: regresion-office-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Playwright y Percy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: 'true'
      HEADLESS: 'true'
      BASE_URL: ${{ vars.BASE_URL || 'https://ecqa.officedepot.com.mx' }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Pruebas de regresión (sin @visual)
        run: npx playwright test --grep-invert "@visual"

      - name: Percy — snapshots visuales
        if: ${{ env.PERCY_TOKEN != '' }}
        run: npx percy exec -- npm run test:visual

      - name: Subir reporte Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
