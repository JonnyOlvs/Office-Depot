name: UsuariosLogin

on:
  workflow_dispatch:
  schedule:
    # Lunes ~08:00 Ciudad de México (UTC-6) → 14:00 UTC
    - cron: '0 14 * * 1'

concurrency:
  group: usuarios-login-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  usuarios-login:
    name: Usuarios Login
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: 'true'
      HEADLESS: 'true'
      BASE_URL: ${{ vars.BASE_URL || 'https://ecqa.officedepot.com.mx' }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Pruebas — tests/UsuariosLogin.spec.ts
        run: npx playwright test tests/UsuariosLogin.spec.ts

      - name: Percy — tests/visual/usuarios-login.visual.spec.ts
        if: ${{ env.PERCY_TOKEN != '' }}
        run: npx percy exec -- npx playwright test tests/visual/usuarios-login.visual.spec.ts

      - name: Subir reporte Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-usuarios-login
          path: playwright-report/
          retention-days: 7
