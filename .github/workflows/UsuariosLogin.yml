name: UsuariosLogin

on:
  workflow_dispatch:
  schedule:
    # Lunes ~08:00 Ciudad de México (UTC-6) → 14:00 UTC
    - cron: '0 14 * * 1'

concurrency:
  group: usuarios-login-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  usuarios-login:
    name: Usuarios Login
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: 'true'
      HEADLESS: 'true'
      BASE_URL: ${{ vars.BASE_URL || 'https://ecqa.officedepot.com.mx' }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Pruebas — tests/UsuariosLogin.spec.ts
        run: npx playwright test tests/UsuariosLogin.spec.ts

      - name: Percy — tests/visual/usuarios-login.visual.spec.ts
        if: ${{ always() && env.PERCY_TOKEN != '' }}
        run: npx percy exec -- npx playwright test tests/visual/usuarios-login.visual.spec.ts

      - name: Generar reporte Allure
        if: ${{ always() }}
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results)" ]; then
            npm run allure:generate
          else
            mkdir -p allure-report
            printf '%s\n' '<html><body><h1>Sin resultados de Allure</h1><p>No se generaron archivos en allure-results.</p></body></html>' > allure-report/index.html
          fi

      - name: Subir reporte Playwright
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-usuarios-login
          path: playwright-report/
          retention-days: 7

      - name: Subir resultados Playwright
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-usuarios-login
          path: test-results/
          retention-days: 7

      - name: Subir resultados Allure
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-usuarios-login
          path: allure-results/
          retention-days: 7

      - name: Subir reporte Allure
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-usuarios-login
          path: allure-report/
          retention-days: 7
